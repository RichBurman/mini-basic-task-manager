<div class="filters">
    <button [class.active]="taskService.filter() === 'all'" (click)="taskService.setFilter('all')">
        All
    </button>
    <button (click)="taskService.setFilter('active')">Active</button>
    <button (click)="taskService.setFilter('completed')">Completed</button>
</div>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Priority</th>
            <th>Completed</th>
            <th>Created</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>
        @for (task of taskService.filteredTasks(); track task.id) {
        <tr>
            <td>{{ task.id }}</td>

            <td>{{ task.title }}</td>

            <td>
                <span [class]="task.priority">
                    {{ task.priority }}
                </span>
            </td>

            <td>
                <input type="checkbox" [checked]="task.completed" (change)="taskService.toggleTask(task.id)" />
            </td>

            <td>{{ task.createdAt | date:'short' }}</td>

            <td>
                <button (click)="taskService.deleteTask(task.id)">
                    Delete
                </button>
            </td>
        </tr>
        }
    </tbody>
</table>
